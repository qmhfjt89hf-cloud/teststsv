<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SiteCraft — конструктор сайтов</title>
  <style>
    :root {
      --bg: #f4f6fb;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --brand: #4f46e5;
      --line: #d6d8e1;
      --danger: #dc2626;
      --success: #16a34a;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
    }

    .app {
      display: grid;
      grid-template-columns: 300px 1fr 320px;
      min-height: 100vh;
      gap: 12px;
      padding: 12px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .panel-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      font-weight: 700;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .panel-body { padding: 14px; overflow: auto; }
    .hint { color: var(--muted); font-size: 13px; margin: 0 0 12px; }

    .controls { display: grid; gap: 8px; }
    .btn {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: var(--text);
      padding: 10px 12px;
      cursor: pointer;
      font-size: 14px;
      transition: .15s;
      width: 100%;
      text-align: left;
    }
    .btn:hover { border-color: #b5b8c9; }
    .btn-primary { background: var(--brand); color: #fff; border-color: var(--brand); }
    .btn-danger { background: #fff5f5; color: var(--danger); border-color: #fecaca; }

    .layout-actions { display: grid; gap: 8px; margin-top: 12px; }

    .canvas-wrap {
      background: repeating-conic-gradient(from 90deg, #f8f9fc 0% 25%, #f3f5fa 0% 50%) 50% / 28px 28px;
      border-radius: 12px;
      border: 1px dashed #cfd3e2;
      padding: 16px;
      min-height: 0;
      overflow: auto;
    }

    .canvas {
      max-width: 980px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.07);
    }

    .drop-zone {
      border: 2px dashed #a6b0ce;
      color: #5b6688;
      font-size: 14px;
      padding: 14px;
      margin: 12px;
      border-radius: 10px;
      text-align: center;
      background: #f7f9ff;
    }

    .block {
      position: relative;
      padding: 44px 28px 28px;
      border-top: 1px solid #eef1f8;
    }
    .block:first-child { border-top: 0; }
    .block.selected {
      outline: 2px solid #6366f1;
      outline-offset: -2px;
      background: #fbfbff;
    }

    .block-toolbar {
      position: absolute;
      top: 8px;
      right: 8px;
      display: flex;
      gap: 6px;
      opacity: .9;
    }

    .tiny-btn {
      border: 1px solid #cdd5ea;
      background: #fff;
      border-radius: 8px;
      font-size: 12px;
      padding: 6px 8px;
      cursor: pointer;
    }

    .hero-title { font-size: clamp(30px, 5vw, 48px); margin: 0 0 10px; }
    .hero-text { font-size: 18px; color: var(--muted); margin: 0; max-width: 680px; }

    .title { font-size: 34px; margin: 0 0 12px; }
    .text { font-size: 16px; line-height: 1.6; margin: 0; }

    .columns {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }
    .card {
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 14px;
      background: #fff;
    }

    .input-group { display: grid; gap: 6px; margin-bottom: 10px; }
    label { font-size: 13px; color: #4b5563; }
    input, textarea, select {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 9px 10px;
      font-size: 14px;
      font-family: inherit;
    }
    textarea { min-height: 90px; resize: vertical; }

    .status { font-size: 12px; color: var(--success); min-height: 16px; margin-top: 6px; }

    @media (max-width: 1200px) {
      .app { grid-template-columns: 280px 1fr; }
      .panel.settings { grid-column: 1 / -1; min-height: 320px; }
    }

    @media (max-width: 880px) {
      .app { grid-template-columns: 1fr; }
      .panel { min-height: 260px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="panel">
      <div class="panel-header">Библиотека блоков</div>
      <div class="panel-body">
        <p class="hint">Нажми на блок, чтобы добавить. Перетаскивай блоки в превью за ручку ↕.</p>
        <div class="controls">
          <button class="btn" data-add="hero">+ Hero-экран</button>
          <button class="btn" data-add="text">+ Текстовый блок</button>
          <button class="btn" data-add="columns">+ 3 карточки</button>
          <button class="btn" data-add="cta">+ Блок с кнопкой</button>
        </div>

        <div class="layout-actions">
          <button class="btn btn-primary" id="saveProject">💾 Сохранить в браузере</button>
          <button class="btn" id="loadProject">📂 Загрузить из браузера</button>
          <button class="btn" id="exportHtml">⬇️ Экспорт HTML</button>
          <button class="btn btn-danger" id="resetProject">🗑 Очистить проект</button>
          <div class="status" id="status"></div>
        </div>
      </div>
    </section>

    <section class="canvas-wrap">
      <div class="canvas" id="canvas">
        <div class="drop-zone">Перетащи блоки вверх/вниз или добавь новые слева.</div>
      </div>
    </section>

    <section class="panel settings">
      <div class="panel-header">Настройки выбранного блока</div>
      <div class="panel-body" id="settingsPanel">
        <p class="hint">Выбери блок на макете, чтобы редактировать тексты, цвета и ссылку кнопки.</p>
      </div>
    </section>
  </main>

  <script>
    const initialBlockData = {
      hero: () => ({ type: 'hero', title: 'Заголовок сайта', text: 'Краткое описание вашего проекта.', bg: '#ffffff', color: '#1f2937' }),
      text: () => ({ type: 'text', title: 'О проекте', text: 'Расскажите, чем ваш сайт полезен посетителю.', bg: '#ffffff', color: '#1f2937' }),
      columns: () => ({
        type: 'columns',
        title: 'Преимущества',
        cards: [
          { title: 'Быстро', text: 'Соберите страницу за 10 минут.' },
          { title: 'Гибко', text: 'Редактируйте тексты и цвета.' },
          { title: 'Просто', text: 'Сохраните и экспортируйте код.' }
        ],
        bg: '#ffffff',
        color: '#1f2937'
      }),
      cta: () => ({
        type: 'cta',
        title: 'Готовы начать?',
        text: 'Добавьте призыв к действию.',
        buttonText: 'Оставить заявку',
        buttonLink: '#',
        bg: '#eef2ff',
        color: '#1f2937',
        accent: '#4f46e5'
      })
    };

    const state = { blocks: [], selectedId: null };

    const canvas = document.getElementById('canvas');
    const settingsPanel = document.getElementById('settingsPanel');
    const statusEl = document.getElementById('status');

    const uid = () => Math.random().toString(36).slice(2, 9);

    function setStatus(text) {
      statusEl.textContent = text;
      if (!text) return;
      setTimeout(() => { if (statusEl.textContent === text) statusEl.textContent = ''; }, 3000);
    }

    function addBlock(type) {
      const factory = initialBlockData[type];
      if (!factory) return;
      const block = { id: uid(), ...factory() };
      state.blocks.push(block);
      state.selectedId = block.id;
      render();
    }

    function selectBlock(id) {
      state.selectedId = id;
      render();
    }

    function moveBlock(id, delta) {
      const idx = state.blocks.findIndex(b => b.id === id);
      const target = idx + delta;
      if (idx < 0 || target < 0 || target >= state.blocks.length) return;
      [state.blocks[idx], state.blocks[target]] = [state.blocks[target], state.blocks[idx]];
      render();
    }

    function deleteBlock(id) {
      state.blocks = state.blocks.filter(b => b.id !== id);
      if (state.selectedId === id) state.selectedId = state.blocks[0]?.id ?? null;
      render();
    }

    function updateBlock(id, patch) {
      const block = state.blocks.find(b => b.id === id);
      if (!block) return;
      Object.assign(block, patch);
      render(false);
    }

    function renderBlockContent(block) {
      if (block.type === 'hero') {
        return `<h1 class="hero-title">${escapeHtml(block.title)}</h1><p class="hero-text">${escapeHtml(block.text)}</p>`;
      }
      if (block.type === 'text') {
        return `<h2 class="title">${escapeHtml(block.title)}</h2><p class="text">${escapeHtml(block.text)}</p>`;
      }
      if (block.type === 'columns') {
        const cards = block.cards.map(card => `<article class="card"><h3>${escapeHtml(card.title)}</h3><p class="text">${escapeHtml(card.text)}</p></article>`).join('');
        return `<h2 class="title">${escapeHtml(block.title)}</h2><div class="columns">${cards}</div>`;
      }
      if (block.type === 'cta') {
        return `<h2 class="title">${escapeHtml(block.title)}</h2><p class="text" style="margin-bottom:16px;">${escapeHtml(block.text)}</p><a href="${escapeAttr(block.buttonLink)}" style="display:inline-block;background:${escapeAttr(block.accent)};color:#fff;text-decoration:none;padding:10px 16px;border-radius:10px;font-weight:600;">${escapeHtml(block.buttonText)}</a>`;
      }
      return '';
    }

    function renderSettings() {
      const block = state.blocks.find(b => b.id === state.selectedId);
      if (!block) {
        settingsPanel.innerHTML = '<p class="hint">Выбери блок на макете, чтобы редактировать тексты, цвета и ссылку кнопки.</p>';
        return;
      }

      const colorControls = `
        <div class="input-group"><label>Цвет фона</label><input type="color" data-field="bg" value="${escapeAttr(block.bg || '#ffffff')}" /></div>
        <div class="input-group"><label>Цвет текста</label><input type="color" data-field="color" value="${escapeAttr(block.color || '#1f2937')}" /></div>
      `;

      let html = `
        <div class="input-group"><label>Заголовок</label><input data-field="title" value="${escapeAttr(block.title || '')}" /></div>
      `;

      if (block.type !== 'columns') {
        html += `<div class="input-group"><label>Текст</label><textarea data-field="text">${escapeHtml(block.text || '')}</textarea></div>`;
      }

      if (block.type === 'columns') {
        block.cards.forEach((card, index) => {
          html += `
            <div class="input-group"><label>Карточка ${index + 1}: заголовок</label><input data-card-title="${index}" value="${escapeAttr(card.title)}" /></div>
            <div class="input-group"><label>Карточка ${index + 1}: текст</label><textarea data-card-text="${index}">${escapeHtml(card.text)}</textarea></div>
          `;
        });
      }

      if (block.type === 'cta') {
        html += `
          <div class="input-group"><label>Текст кнопки</label><input data-field="buttonText" value="${escapeAttr(block.buttonText)}" /></div>
          <div class="input-group"><label>Ссылка кнопки</label><input data-field="buttonLink" value="${escapeAttr(block.buttonLink)}" /></div>
          <div class="input-group"><label>Цвет кнопки</label><input type="color" data-field="accent" value="${escapeAttr(block.accent)}" /></div>
        `;
      }

      settingsPanel.innerHTML = html + colorControls;

      settingsPanel.querySelectorAll('[data-field]').forEach(input => {
        input.addEventListener('input', e => updateBlock(block.id, { [e.target.dataset.field]: e.target.value }));
      });

      settingsPanel.querySelectorAll('[data-card-title]').forEach(input => {
        input.addEventListener('input', e => {
          const index = Number(e.target.dataset.cardTitle);
          const nextCards = block.cards.map((card, i) => i === index ? { ...card, title: e.target.value } : card);
          updateBlock(block.id, { cards: nextCards });
        });
      });

      settingsPanel.querySelectorAll('[data-card-text]').forEach(input => {
        input.addEventListener('input', e => {
          const index = Number(e.target.dataset.cardText);
          const nextCards = block.cards.map((card, i) => i === index ? { ...card, text: e.target.value } : card);
          updateBlock(block.id, { cards: nextCards });
        });
      });
    }

    function render(shouldRenderSettings = true) {
      if (!state.blocks.length) {
        canvas.innerHTML = '<div class="drop-zone">Перетащи блоки вверх/вниз или добавь новые слева.</div>';
      } else {
        canvas.innerHTML = state.blocks.map(block => `
          <section class="block ${block.id === state.selectedId ? 'selected' : ''}" data-id="${block.id}" style="background:${escapeAttr(block.bg || '#fff')}; color:${escapeAttr(block.color || '#1f2937')}">
            <div class="block-toolbar">
              <button class="tiny-btn" data-action="up" data-id="${block.id}">↑</button>
              <button class="tiny-btn" data-action="down" data-id="${block.id}">↓</button>
              <button class="tiny-btn" data-action="delete" data-id="${block.id}">Удалить</button>
            </div>
            ${renderBlockContent(block)}
          </section>
        `).join('');
      }

      canvas.querySelectorAll('.block').forEach(el => {
        el.addEventListener('click', () => selectBlock(el.dataset.id));
      });

      canvas.querySelectorAll('[data-action]').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          const id = e.target.dataset.id;
          const action = e.target.dataset.action;
          if (action === 'up') moveBlock(id, -1);
          if (action === 'down') moveBlock(id, 1);
          if (action === 'delete') deleteBlock(id);
        });
      });

      if (shouldRenderSettings) renderSettings();
    }

    function saveProject() {
      localStorage.setItem('sitecraft-project', JSON.stringify(state.blocks));
      setStatus('Проект сохранён.');
    }

    function loadProject() {
      try {
        const raw = localStorage.getItem('sitecraft-project');
        if (!raw) return setStatus('Сохранение не найдено.');
        const blocks = JSON.parse(raw);
        if (!Array.isArray(blocks)) throw new Error('invalid');
        state.blocks = blocks;
        state.selectedId = state.blocks[0]?.id ?? null;
        render();
        setStatus('Проект загружен.');
      } catch {
        setStatus('Ошибка чтения сохранения.');
      }
    }

    function resetProject() {
      state.blocks = [];
      state.selectedId = null;
      render();
      setStatus('Проект очищен.');
    }

    function exportHtml() {
      const sections = state.blocks.map(b => {
        const style = `background:${b.bg || '#fff'};color:${b.color || '#1f2937'};padding:56px 20px;border-top:1px solid #eceff6;`;
        if (b.type === 'hero') return `<section style="${style}"><div style="max-width:1000px;margin:auto;"><h1 style="font-size:48px;margin:0 0 10px;">${escapeHtml(b.title)}</h1><p style="font-size:20px;color:#6b7280;margin:0;">${escapeHtml(b.text)}</p></div></section>`;
        if (b.type === 'text') return `<section style="${style}"><div style="max-width:1000px;margin:auto;"><h2 style="font-size:36px;margin:0 0 12px;">${escapeHtml(b.title)}</h2><p style="line-height:1.7;margin:0;">${escapeHtml(b.text)}</p></div></section>`;
        if (b.type === 'columns') {
          const cards = b.cards.map(c => `<div style="border:1px solid #e2e8f0;border-radius:10px;padding:14px;"><h3>${escapeHtml(c.title)}</h3><p>${escapeHtml(c.text)}</p></div>`).join('');
          return `<section style="${style}"><div style="max-width:1000px;margin:auto;"><h2 style="font-size:36px;margin:0 0 12px;">${escapeHtml(b.title)}</h2><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;">${cards}</div></div></section>`;
        }
        return `<section style="${style}"><div style="max-width:1000px;margin:auto;"><h2 style="font-size:36px;margin:0 0 12px;">${escapeHtml(b.title)}</h2><p style="margin:0 0 16px;">${escapeHtml(b.text)}</p><a href="${escapeAttr(b.buttonLink)}" style="display:inline-block;background:${escapeAttr(b.accent || '#4f46e5')};color:#fff;padding:10px 16px;border-radius:10px;text-decoration:none;">${escapeHtml(b.buttonText)}</a></div></section>`;
      }).join('\n');

      const html = `<!doctype html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Экспорт проекта</title></head><body style="margin:0;font-family:Arial,sans-serif;background:#fff;color:#111827">${sections}</body></html>`;
      const blob = new Blob([html], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'sitecraft-export.html';
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      setStatus('HTML экспортирован.');
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function escapeAttr(value) {
      return escapeHtml(value).replaceAll('`', '&#096;');
    }

    document.querySelectorAll('[data-add]').forEach(btn => {
      btn.addEventListener('click', () => addBlock(btn.dataset.add));
    });

    document.getElementById('saveProject').addEventListener('click', saveProject);
    document.getElementById('loadProject').addEventListener('click', loadProject);
    document.getElementById('resetProject').addEventListener('click', resetProject);
    document.getElementById('exportHtml').addEventListener('click', exportHtml);

    addBlock('hero');
    addBlock('text');
  </script>
</body>
</html>
